<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction | FinanceTracker</title>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace("login.html");
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">COZY</div>
            </div>
            <nav>
                <a href="index.html" class="nav-item">🏠 <span class="nav-label">Home</span></a>
                <a href="analytics.html" class="nav-item">📊 <span class="nav-label">Analytics</span></a>
                <a href="history.html" class="nav-item">🕒 <span class="nav-label">History</span></a>
                <a href="budget.html" class="nav-item">📅 <span class="nav-label">Budget</span></a>
                <a href="transaction.html" class="nav-item active">➕ <span class="nav-label">Add New</span></a>
                <a href="#" id="logout-link" class="nav-item logout-item">🚪 <span class="nav-label">Logout</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div style="max-width: 600px; margin: 0 auto;">
                <header class="page-header" style="margin-bottom: 2rem; text-align: center;">
                    <h1>New Transaction</h1>
                    <p style="opacity: 0.6;">Record your income or expenses</p>
                </header>

                <section class="glass">
                    <form id="transaction-form">
                        <div class="input-group">
                            <label>Description</label>
                            <input type="text" id="description" placeholder="e.g. Coffee" required>
                        </div>
                        <div class="input-group">
                            <label>Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="input-group">
                            <label>Amount ($)</label>
                            <input type="number" id="amount" step="0.01" placeholder="0.00" onwheel="this.blur()"
                                required>
                        </div>
                        <div class="input-group">
                            <label>Type</label>
                            <select id="type" class="glass-input" style="background: #111;">
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Category</label>
                            <select id="category" class="glass-input" style="background: #111;">
                                <option value="1">Housing/Rent</option>
                                <option value="2">Groceries</option>
                                <option value="3">Transport</option>
                                <option value="4">Utilities</option>
                                <option value="5">Entertainment</option>
                                <option value="6">Healthcare</option>
                                <option value="7">Savings/Investments</option>
                                <option value="8">Misc Expenses</option>
                                <option value="9">Salary</option>
                                <option value="10">Side Job</option>
                                <option value="11">Interest</option>
                                <option value="12">Gifts/Other incomes</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Add Transaction</button>
                    </form>
                </section>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/transactions.js"></script>
    <script>
        document.getElementById('logout-link').onclick = () => { localStorage.removeItem('token'); window.location.href = 'login.html'; };
    </script>
</body>

</html>

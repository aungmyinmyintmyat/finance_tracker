<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="glass-card auth-container">
        <h2 id="auth-title">Welcome Back</h2>
        <p id="auth-subtitle">Let us aid you track your finances</p><br>
        <div id="error-message" class="error-banner" style="display: none;"></div>
        <div id="success-message" class="success-banner" style="display: none;"></div>
        <form id="auth-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div id="register-fields" style="display: none;">
                <div class="input-group">
                    <label>Monthly Income</label>
                    <input type="number" id="income" onwheel="this.blur()" placeholder="e.g. 1000">
                </div>
                <div class="input-group">
                    <label>Account Number</label>
                    <input type="text" id="acc_number" placeholder="Last 4 digits or ID">
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">Login</button>
        </form>
        <p class="toggle-text">
            Don't have an account? <a href="#" id="toggle-auth">Sign Up</a>
        </p>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
